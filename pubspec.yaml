name: openclaw_voice
description: OpenClaw Voice Assistant - Talk to your AI assistant

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP requests
  http: ^1.2.0
  
  # Speech to text (Android built-in)
  speech_to_text: ^6.6.0
  
  # Text to speech (Android built-in TTS)
  flutter_tts: ^4.0.2
  
  # Telegram Bot API
  telegram_bot_api: ^0.0.1
  
  # Local storage for threads
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Audio recording
  record: ^5.0.4
  
  # Permissions
  permission_handler: ^11.3.0
  
  # UI
  cupertino_icons: ^1.0.2
  flutter_markdown: ^0.6.20
  
  # Animations
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
